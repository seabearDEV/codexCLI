name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            binary: ccli-linux-x64
          - runner: ubuntu-24.04-arm
            binary: ccli-linux-arm64
          - runner: windows-latest
            binary: ccli-win-x64.exe

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.binary }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - name: Build SEA binary
        run: node scripts/sea-build.js ${{ matrix.binary }}

      - name: Smoke test
        shell: bash
        run: |
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            ./dist/${{ matrix.binary }} --version
          else
            chmod +x ./dist/${{ matrix.binary }}
            ./dist/${{ matrix.binary }} --version
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  build-macos:
    runs-on: macos-latest
    name: Build ccli-macos-universal

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        id: setup-node
        with:
          node-version: 24

      - run: npm ci

      # ── arm64 slice (native on macos-latest) ─────────────────────────────
      - name: Build arm64 slice
        run: node scripts/sea-build.js ccli-macos-arm64

      - name: Smoke test arm64
        run: |
          chmod +x dist/ccli-macos-arm64
          ./dist/ccli-macos-arm64 --version

      # ── x64 slice (cross-build using downloaded x64 Node) ────────────────
      - name: Download Node x64 binary
        id: node-x64
        run: |
          NODE_VERSION="${{ steps.setup-node.outputs.node-version }}"
          NODE_VERSION="${NODE_VERSION#v}"
          TARBALL="node-v${NODE_VERSION}-darwin-x64.tar.gz"
          URL="https://nodejs.org/dist/v${NODE_VERSION}/${TARBALL}"
          echo "Downloading ${URL}"
          curl -fsSL "$URL" -o "$TARBALL"
          tar xzf "$TARBALL"
          NODE_X64="$(pwd)/node-v${NODE_VERSION}-darwin-x64/bin/node"
          echo "node_x64=${NODE_X64}" >> "$GITHUB_OUTPUT"
          file "$NODE_X64"

      - name: Build x64 slice
        run: node scripts/sea-build.js ccli-macos-x64 --node-binary "${{ steps.node-x64.outputs.node_x64 }}"

      - name: Smoke test x64
        run: |
          chmod +x dist/ccli-macos-x64
          arch -x86_64 ./dist/ccli-macos-x64 --version

      # ── Universal binary ─────────────────────────────────────────────────
      - name: Create universal binary
        run: |
          lipo -create dist/ccli-macos-arm64 dist/ccli-macos-x64 -output dist/ccli-macos-universal
          codesign --remove-signature dist/ccli-macos-universal
          codesign --sign - dist/ccli-macos-universal
          file dist/ccli-macos-universal

      - name: Smoke test universal (arm64)
        run: ./dist/ccli-macos-universal --version

      - name: Smoke test universal (x86_64)
        run: arch -x86_64 ./dist/ccli-macos-universal --version

      - uses: actions/upload-artifact@v7
        with:
          name: ccli-macos-universal
          path: dist/ccli-macos-universal

  release:
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts

      - name: Detect prerelease
        id: prerelease
        run: |
          # SemVer prerelease tags contain a `-` after the patch number
          # (e.g. v1.11.1-beta.0, v1.12.0-rc.1). Stable tags are pure
          # MAJOR.MINOR.PATCH like v1.11.1.
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Pinned to v2.6.2 after v3.0.0 emitted a GitHub-API-side "Error
      # creating policy" during upload on the v1.13.0 release run. Root
      # cause is unclear (the string isn't in v3's source, so it surfaces
      # from the GitHub API response). Revisit before 2026-06-02, the
      # forced-Node-24 cutover — we have ~6 weeks to properly diagnose
      # or wait for a v3 patch. Tracked in #95.
      - uses: softprops/action-gh-release@v2.6.2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.prerelease == 'true' }}
          files: artifacts/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    name: Update Homebrew Tap

    steps:
      - name: Get version + channel from tag
        id: version
        run: |
          # Strip the leading "v" so $version is bare semver.
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          # Prerelease tags (anything with a `-`) ship to the @beta formula
          # so they don't bump stable users on `brew upgrade`. Stable tags
          # ship to the canonical ccli formula. Beta installs use a distinct
          # binary name (`ccli-beta`) so both formulas can coexist on a
          # machine without symlink conflicts.
          if [[ "${version}" == *-* ]]; then
            # Beta channel uses `ccli-beta.rb` (NOT `ccli@beta.rb`).
            # Homebrew's `Formulary.class_s` only handles `@<digit>`-versioned
            # formulas (like `python@3.11`, `node@20`); it does NOT handle
            # `@<letter>` like `@beta`. Trying to load `ccli@beta.rb` errors
            # with "Expected to find class Ccli@beta" — which isn't even a
            # valid Ruby identifier. The dash form sidesteps brew's class_s
            # entirely: `ccli-beta.rb` -> `CcliBeta` (separator + capitalize).
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "formula_class=CcliBeta" >> "$GITHUB_OUTPUT"
            echo "formula_file=ccli-beta.rb" >> "$GITHUB_OUTPUT"
            echo "binary_name=ccli-beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "formula_class=Ccli" >> "$GITHUB_OUTPUT"
            echo "formula_file=ccli.rb" >> "$GITHUB_OUTPUT"
            echo "binary_name=ccli" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release binaries
        run: |
          base="https://github.com/seabearDEV/codexCLI/releases/download/${GITHUB_REF_NAME}"
          for bin in ccli-macos-universal ccli-linux-x64 ccli-linux-arm64; do
            curl -fsSL "$base/$bin" -o "$bin"
          done

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "macos_universal=$(sha256sum ccli-macos-universal | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum ccli-linux-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum ccli-linux-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: seabearDEV/homebrew-ccli
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-ccli

      - name: Generate formula
        env:
          CCLI_VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          FORMULA_CLASS: ${{ steps.version.outputs.formula_class }}
          FORMULA_FILE: ${{ steps.version.outputs.formula_file }}
          BINARY_NAME: ${{ steps.version.outputs.binary_name }}
          SHA_MACOS_UNIVERSAL: ${{ steps.sha.outputs.macos_universal }}
          SHA_LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          mkdir -p homebrew-ccli/Formula
          cat > "homebrew-ccli/Formula/$FORMULA_FILE" << EOF
          class $FORMULA_CLASS < Formula
            desc "Command-line information store for quick reference of frequently used data"
            homepage "https://github.com/seabearDEV/codexCLI"
            version "$CCLI_VERSION"
            license "MIT"

            livecheck do
              url :stable
              strategy :github_latest
            end

            on_macos do
              url "https://github.com/seabearDEV/codexCLI/releases/download/v$CCLI_VERSION/ccli-macos-universal"
              sha256 "$SHA_MACOS_UNIVERSAL"
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/seabearDEV/codexCLI/releases/download/v$CCLI_VERSION/ccli-linux-arm64"
                sha256 "$SHA_LINUX_ARM64"
              else
                url "https://github.com/seabearDEV/codexCLI/releases/download/v$CCLI_VERSION/ccli-linux-x64"
                sha256 "$SHA_LINUX_X64"
              end
            end

            def install
              binary = Dir.glob("ccli-*").first
              bin.install binary => "$BINARY_NAME"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/$BINARY_NAME --version")
            end
          end
          EOF

      - name: Clean up obsolete beta formula
        if: steps.version.outputs.channel == 'beta'
        working-directory: homebrew-ccli
        run: |
          # v1.11.1-beta.0 and beta.1 wrote `Formula/ccli@beta.rb`, which
          # brew can't load (its class_s regex only handles @<digit>-versioned
          # formulas). beta.2 renames to `ccli-beta.rb`. Remove the broken
          # file from the tap so users running `brew update` stop seeing
          # the load error.
          if [[ -f Formula/ccli@beta.rb ]]; then
            git rm Formula/ccli@beta.rb
          fi

      - name: Push updated formula
        working-directory: homebrew-ccli
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/$FORMULA_FILE"
          git commit -m "Update $CHANNEL channel to $CCLI_VERSION"
          git push
        env:
          CCLI_VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          FORMULA_FILE: ${{ steps.version.outputs.formula_file }}
